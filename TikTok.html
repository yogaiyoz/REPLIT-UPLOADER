<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downloader</title>
</head>
<body>

<input type="text" id="url" placeholder="Tempel link TikTok">
<button onclick="fetchData()">Download</button>

<div id="result"></div>

<script>
async function fetchData() {
    const input = document.getElementById('url').value;
    const result = document.getElementById('result');

    if (!input) return alert("Masukkan link TikTok");

    result.innerHTML = "Loading...";

    try {
        const res = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(input)}`);
        const json = await res.json();
        const data = json.data;

        result.innerHTML = "";

        if (data.play) {
            result.innerHTML += `
                <video src="${data.play}" controls width="300"></video><br><br>

                <a href="${data.play}" download="video.mp4">
                    <button>Download Video</button>
                </a>

                <a href="${data.music}" download="audio.mp3">
                    <button>Download MP3</button>
                </a>
            `;
        }

        if (data.images) {
            data.images.forEach((img, i) => {
                result.innerHTML += `
                    <img src="${img}" width="200"><br>

                    <a href="${img}" download="foto_${i+1}.jpg">
                        <button>Download Foto ${i+1}</button>
                    </a><br><br>
                `;
            });
        }

    } catch (err) {
        result.innerHTML = "Gagal mengambil data";
    }
}
</script>

</body>
</html>
