<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Downloader</title>
</head>

<body style="
margin:0;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
min-height:100vh;
text-align:center;
padding:20px;
box-sizing:border-box;
">

<h2>TikTok Downloader</h2>

<input 
type="text" 
id="url" 
placeholder="URL TikTok"
style="
width:300px;
padding:10px;
outline:none;
"
>

<br>

<button onclick="fetchData()" style="
padding:10px 20px;
cursor:pointer;
">
Download
</button>

<br><br>

<div id="result" style="
width:100%;
max-width:400px;
word-break:break-word;
"></div>

<div style="
position:fixed;
bottom:10px;
left:0;
right:0;
opacity:0.15;
font-size:12px;
user-select:none;
pointer-events:none;
">
© <span id="year"></span> • Panduwardhana
</div>

<script>

document.getElementById("year").innerText = new Date().getFullYear();

async function fetchData() {

    const input = document.getElementById("url").value;
    const result = document.getElementById("result");

    if (!input) {
        alert("Masukkan URL TikTok");
        return;
    }

    result.innerHTML = "Loading...";

    try {

        const res = await fetch(
            `https://www.tikwm.com/api/?url=${encodeURIComponent(input)}`
        );

        const json = await res.json();
        const data = json.data;

        const tags = data.title
            ? data.title.match(/#\w+/g)
            : [];

        result.innerHTML = `

            <img 
                src="${data.cover}" 
                width="150"
                style="
                border-radius:10px;
                object-fit:cover;
                "
            >

            <br><br>

            <b>@${data.author.unique_id}</b>

            <br><br>

            <div style="
            font-size:14px;
            ">
                ${data.title || "Tidak ada caption"}
            </div>

            <br>

            <div style="
            font-size:13px;
            opacity:0.7;
            ">
                ${tags ? tags.join(" ") : ""}
            </div>

            <br><br>

            <button onclick="openPlayer('${data.play}')" style="
            padding:10px 20px;
            cursor:pointer;
            ">
                ▶ Play Video
            </button>

            <br><br>

            <a href="${data.play}" download="video.mp4">
                <button style="
                padding:10px 20px;
                cursor:pointer;
                ">
                    Download Video
                </button>
            </a>

            <br><br>

            <a href="${data.music}" download="audio.mp3">
                <button style="
                padding:10px 20px;
                cursor:pointer;
                ">
                    Download MP3
                </button>
            </a>

        `;

    } catch (err) {

        result.innerHTML = "Gagal mengambil data";

    }

}

function openPlayer(videoUrl) {

    const popup = window.open("", "_blank");

    popup.document.write(`

        <!DOCTYPE html>

        <html>

        <head>
        <title>Player</title>
        </head>

        <body style="
        margin:0;
        background:black;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        ">

        <video
            controls
            autoplay
            controlsList="nodownload noplaybackrate"
            disablePictureInPicture
            oncontextmenu="return false"
            style="
            width:100%;
            max-width:500px;
            height:auto;
            "
        >
            <source src="${videoUrl}" type="video/mp4">
        </video>

        </body>

        </html>

    `);

}

</script>

</body>
</html>
