<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Slot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0; padding: 0;
            background: linear-gradient(180deg, #1a0033, #330066);
            color: white;
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            overflow: hidden;
        }
        
        .header { background: rgba(0,0,0,0.9); padding: 15px; display: flex; justify-content: space-around; align-items: center; border-bottom: 4px solid #ffd700; }
        .balance, .bet { background: #000; padding: 10px 20px; border: 3px solid #ffd700; border-radius: 10px; }
        
        .game-container {
            max-width: 900px;
            margin: 20px auto;
            background: #000;
            border: 8px solid #ffd700;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 40px #ff00ff;
        }
        
        .reels {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background: #111;
            padding: 15px;
            border: 5px solid #00ffff;
            border-radius: 10px;
            position: relative;
        }
        
        .reel {
            height: 300px;
            background: #222;
            border: 3px solid #ffd700;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        
        .symbol {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 65px;
            transition: all 0.2s;
            border-bottom: 2px solid #333;
        }
        
        .scatter { animation: scatterPulse 1.2s infinite; }
        @keyframes scatterPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.25); }
        }
        
        .win-symbol {
            animation: winExplode 0.8s forwards;
        }
        
        @keyframes winExplode {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1.1); }
        }
        
        .particle {
            position: absolute;
            font-size: 30px;
            pointer-events: none;
            z-index: 100;
            animation: particleFly 1.5s forwards;
        }
        
        @keyframes particleFly {
            to {
                opacity: 0;
                transform: translate(var(--x), var(--y)) scale(0.5);
            }
        }
        
        .win-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 42px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 30px #ff00ff, 0 0 60px #ffff00;
            z-index: 200;
            pointer-events: none;
            animation: bigWinPop 2s forwards;
        }
        
        @keyframes bigWinPop {
            0% { transform: translate(-50%, -50%) scale(0.2); opacity: 0; }
            40% { transform: translate(-50%, -50%) scale(1.2); }
            70% { transform: translate(-50%, -50%) scale(0.95); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        
        button {
            font-family: 'Press Start 2P', cursive;
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(#ff00ff, #aa00aa);
            color: white;
            border: 4px solid #ffd700;
            cursor: pointer;
            border-radius: 8px;
        }
        .spin-btn { padding: 20px 80px; font-size: 24px; background: linear-gradient(#00ff00, #008800); }
    </style>
</head>
<body>
    <div class="header">
        <div class="balance">BALANCE: <span id="balance">50000</span></div>
        <div class="bet">BET: <span id="bet">100</span></div>
        <div>Pragmatic Play Simulator</div>
    </div>

    <div class="game-container">
        <div class="reels" id="reels"></div>
        
        <div class="controls" style="margin-top:20px; display:flex; justify-content:center; gap:20px; flex-wrap:wrap;">
            <button onclick="changeBet(-50)">- BET</button>
            <button onclick="changeBet(50)">+ BET</button>
            <button class="spin-btn" onclick="spin()">SPIN</button>
            <button onclick="autoSpinToggle()">AUTO</button>
        </div>
        
        <div class="info" id="message" style="margin-top:15px; font-size:16px;">Good Luck!</div>
    </div>

    <script>
        const symbols = ['🍒','🍋','🍉','🔔','⭐','💎','7️⃣','🌟','W','💰'];
        const scatters = '💰'; // Scatter symbol
        
        let balance = 50000;
        let bet = 100;
        let isSpinning = false;
        let autoSpinning = false;
        
        const reelsContainer = document.getElementById('reels');
        let reels = [];
        
        function createReels() {
            reelsContainer.innerHTML = '';
            reels = [];
            for (let i = 0; i < 5; i++) {
                const reel = document.createElement('div');
                reel.className = 'reel';
                for (let j = 0; j < 3; j++) {
                    const sym = document.createElement('div');
                    sym.className = 'symbol';
                    sym.textContent = getRandomSymbol();
                    reel.appendChild(sym);
                }
                reelsContainer.appendChild(reel);
                reels.push(reel);
            }
        }
        
        function getRandomSymbol() {
            return symbols[Math.floor(Math.random() * symbols.length)];
        }
        
        function createParticles(x, y, count, symbol) {
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.textContent = symbol;
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                
                const angle = Math.random() * 360;
                const distance = 80 + Math.random() * 120;
                p.style.setProperty('--x', Math.cos(angle * Math.PI/180) * distance + 'px');
                p.style.setProperty('--y', Math.sin(angle * Math.PI/180) * distance - 100 + 'px');
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 2000);
            }
        }
        
        function spin() {
            if (isSpinning || balance < bet) return;
            
            balance -= bet;
            updateUI();
            isSpinning = true;
            document.getElementById('message').textContent = 'SPINNING...';
            
            const finalGrid = Array(5).fill().map(() => 
                Array(3).fill().map(getRandomSymbol)
            );
            
            let spinTime = 1800;
            const start = Date.now();
            
            function animate() {
                const elapsed = Date.now() - start;
                
                reels.forEach((reel, i) => {
                    const children = reel.children;
                    for (let j = 0; j < 3; j++) {
                        if (elapsed < spinTime + i * 180) {
                            children[j].textContent = getRandomSymbol();
                        } else {
                            children[j].textContent = finalGrid[i][j];
                        }
                    }
                });
                
                if (elapsed < spinTime + 900) {
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    calculateWin(finalGrid);
                }
            }
            animate();
        }
        
        function calculateWin(grid) {
            let totalWin = 0;
            let winPositions = [];
            let scatterCount = 0;
            
            // Hitung Scatter
            grid.forEach((col, x) => {
                col.forEach((sym, y) => {
                    if (sym === scatters) {
                        scatterCount++;
                        winPositions.push({x, y});
                    }
                });
            });
            
            // Scatter Win
            if (scatterCount >= 3) {
                const scatterWin = bet * scatterCount * 8;
                totalWin += scatterWin;
                
                // Animasi Scatter
                winPositions.forEach(pos => {
                    const symEl = reels[pos.x].children[pos.y];
                    symEl.classList.add('scatter');
                    createParticles(
                        reels[pos.x].offsetLeft + 60, 
                        reels[pos.x].offsetTop + pos.y * 100 + 50, 
                        15, '✨'
                    );
                });
            }
            
            // Simple Line Win (horizontal)
            for (let row = 0; row < 3; row++) {
                const lineSymbols = grid.map(col => col[row]);
                const first = lineSymbols[0];
                
                if (lineSymbols.every((s, i) => i < 3 || s === first || s === 'W')) {
                    const winAmount = bet * 15;
                    totalWin += winAmount;
                    
                    lineSymbols.forEach((sym, col) => {
                        if (sym !== scatters) {
                            const el = reels[col].children[row];
                            el.classList.add('win-symbol');
                            createParticles(
                                reels[col].offsetLeft + 50,
                                reels[col].offsetTop + row * 100 + 50,
                                12, sym
                            );
                        }
                    });
                }
            }
            
            // Tampilkan hasil
            if (totalWin > 0) {
                balance += totalWin;
                const msg = document.getElementById('message');
                msg.innerHTML = `<span class="win-message">WIN<br>${totalWin.toLocaleString('id-ID')} !</span>`;
                
                setTimeout(() => {
                    Array.from(document.querySelectorAll('.symbol')).forEach(el => {
                        el.classList.remove('win-symbol', 'scatter');
                    });
                }, 2200);
            } else {
                document.getElementById('message').textContent = 'Better Luck Next Time';
            }
            
            updateUI();
        }
        
        function updateUI() {
            document.getElementById('balance').textContent = balance.toLocaleString('id-ID');
            document.getElementById('bet').textContent = bet;
        }
        
        function changeBet(amt) {
            if (isSpinning) return;
            bet = Math.max(50, Math.min(2000, bet + amt));
            updateUI();
        }
        
        function autoSpinToggle() {
            autoSpinning = !autoSpinning;
            if (autoSpinning) autoSpinLoop();
        }
        
        function autoSpinLoop() {
            if (!autoSpinning || balance < bet) {
                autoSpinning = false;
                return;
            }
            spin();
            setTimeout(autoSpinLoop, 3000);
        }
        
        window.onload = () => {
            createReels();
            updateUI();
            document.getElementById('message').textContent = 'Scatter & Win Explosion Ready!';
        };
    </script>
</body>
</html>
